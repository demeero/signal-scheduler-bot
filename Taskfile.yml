version: "3"

vars:
  GOLANGCI_LINT_VERSION: '{{.GOLANGCI_LINT_VERSION | default "2.12"}}'

dotenv: [ ".env" ]

tasks:
  deps:
    desc: Install Go module dependencies
    cmds:
      - go mod download
      - go mod tidy
      - go mod vendor

  lint:
    desc: Run Go linters
    cmds:
      - docker run --rm -v ${PWD}/:/app -w /app golangci/golangci-lint:v{{.GOLANGCI_LINT_VERSION}}-alpine golangci-lint run -v

  fmt:
    desc: Run Go formatting
    cmds:
      - docker run --rm -v ${PWD}/:/app -w /app golangci/golangci-lint:v{{.GOLANGCI_LINT_VERSION}}-alpine golangci-lint -v fmt

  build:
    desc: Build API binary
    cmds:
      - task: build:binary
        vars:
          BINARY_PATH: ./cmd/botsrv/...

  build:binary:
    internal: true
    vars:
      GOOS: '{{.GOOS | default OS}}'
      GOARCH: '{{.GOARCH | default ARCH}}'
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
    cmds:
      - GOOS={{.GOOS}} GOARCH={{.GOARCH}} go build -ldflags="-X 'github.com/demeero/signal-scheduler-bot/cmd/botsrv.Version={{.VERSION}}' -X 'github.com/demeero/signal-scheduler-bot/cmd/botsrv.Commit={{.COMMIT}}' -X 'github.com/demeero/signal-scheduler-bot/cmd/botsrv.BuildTime={{.BUILD_TIME}}'" -v -o ./bin/signal_scheduler_bot  {{.BINARY_PATH}}

  run:
    desc: Run API server locally.
    cmds:
      - go run ./cmd/botsrv

  test:
    desc: Run unit and integration tests.
    cmds:
      - go test -count 1 -race -v ./...

  test:coverage:
    desc: Run tests with coverage summary and HTML report.
    cmds:
      - mkdir -p .coverage
      - go test -count 1 -coverprofile=.coverage/cover.out ./...
      - go tool cover -func=.coverage/cover.out
      - go tool cover -html=.coverage/cover.out -o .coverage/cover.html

  release:
    desc: "Update CHANGELOG.md and create tag version"
    cmds:
      - ./release.sh